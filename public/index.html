<!DOCTYPE html>
<html>
<head>
  <title>Emergency Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
const map = L.map('map').setView([6.5244, 3.3792], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Instead of http://localhost:5000/api/emergency/report
fetch("/api/emergency/report", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    Authorization: `Bearer ${token}`
  },
  body: JSON.stringify({ type, latitude, longitude })
});

socket.on("newEmergency", (data) => {
  const coords = data.location.coordinates;
  L.marker([coords[1], coords[0]]).addTo(map)
    .bindPopup("🚨 Emergency").openPopup();
});

let responderMarker;

socket.on("responderMove", (data) => {
  if (responderMarker) {
    responderMarker.setLatLng([data.lat, data.lng]);
  } else {
    responderMarker = L.marker([data.lat, data.lng]).addTo(map);
  }
});
</script>
</body>
</html>
